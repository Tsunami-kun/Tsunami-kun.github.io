<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none">
  <rect width="1600" height="900" fill="#141414"/>
  <!-- Grid -->
  <g stroke="#222" stroke-width="1">
    <line x1="400" y1="0" x2="400" y2="900"/>
    <line x1="800" y1="0" x2="800" y2="900"/>
    <line x1="1200" y1="0" x2="1200" y2="900"/>
    <line x1="0" y1="225" x2="1600" y2="225"/>
    <line x1="0" y1="450" x2="1600" y2="450"/>
    <line x1="0" y1="675" x2="1600" y2="675"/>
  </g>
  <!-- Abstract shapes -->
  <circle cx="800" cy="400" r="120" stroke="#333" stroke-width="2" fill="none"/>
  <circle cx="800" cy="400" r="80" stroke="#444" stroke-width="1.5" fill="none"/>
  <circle cx="800" cy="400" r="40" fill="#333"/>
  <line x1="600" y1="400" x2="1000" y2="400" stroke="#333" stroke-width="1"/>
  <line x1="800" y1="200" x2="800" y2="600" stroke="#333" stroke-width="1"/>
  <!-- Label -->
  <text x="800" y="700" text-anchor="middle" font-family="monospace" font-size="24" fill="#555">PAPER</text>
</svg>
